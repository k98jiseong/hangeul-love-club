<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한글사랑클럽 월별 단어 뽑기</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --color-dark-blue: #010D26;
            --color-primary-blue: #0455BF;
            --color-lever-yellow: #feca57;
            --color-bg-light-blue: #CEE8F2;
            --color-white: #FFFFFF;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--color-bg-light-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--color-white);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* 1. 로그인 화면 */
        #intro-screen { display: block; }
        #username {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 12px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        /* 2. 메인 기계 디자인 (이미지 3 스타일) */
        #main-screen { display: none; }
        
        .gacha-machine {
            width: 220px;
            margin: 0 auto;
            position: relative;
            padding-bottom: 20px;
        }

        /* 투명 돔 */
        .machine-dome {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            border: 4px solid var(--color-primary-blue);
            position: relative;
            z-index: 2;
            overflow: hidden;
        }

        /* 캡슐 그래픽 (반원 그라데이션) */
        .capsule {
            position: absolute;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff 50%, #4da6ff 50%);
            border: 1px solid #ccc;
            box-shadow: 1px 2px 4px rgba(0,0,0,0.1);
        }

        .c1 { top: 80px; left: 40px; }
        .c2 { top: 110px; left: 110px; }
        .c3 { top: 60px; left: 120px; }
        .c4 { top: 100px; left: 70px; }
        .c5 { top: 130px; left: 50px; }
        .c6 { top: 50px; left: 80px; }

        /* 기계 몸체 (고정형) */
        .machine-body {
            width: 210px;
            height: 180px;
            background-color: #333b4d;
            border-radius: 25px;
            margin: -40px auto 0; /* 돔과 겹침 */
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
        }

        /* 레버 버튼 (노란색) */
        .lever-btn {
            width: 100px;
            height: 100px;
            background-color: var(--color-lever-yellow);
            border: 6px solid #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: var(--color-dark-blue);
            cursor: pointer;
            box-shadow: 0 6px 0 #d39e00;
            transition: all 0.1s;
            margin-top: 10px;
        }

        .lever-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #d39e00;
        }

        /* 당첨 바 (검은색) */
        #result-bar {
            width: 200px;
            height: 45px;
            background: #000;
            border-radius: 25px;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4da6ff;
            font-weight: bold;
            font-size: 1.1rem;
            border: 2px solid #444;
        }

        /* 애니메이션: 캡슐 셔플 */
        .spin .capsule {
            animation: shuffle 0.2s infinite alternate;
        }

        @keyframes shuffle {
            from { transform: translate(0, 0); }
            to { transform: translate(5px, -10px) rotate(20deg); }
        }

        /* 버튼 및 텍스트 */
        button {
            background: var(--color-primary-blue);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .btn-select { background: #1dd1a1; margin-top: 10px; }
        .info-txt { font-size: 0.9rem; color: #666; margin-top: 15px; }

        #success-screen { display: none; }
    </style>
</head>
<body>

    <div id="intro-screen" class="container">
        <h1>한글사랑클럽<br>단어 뽑기</h1>
        <p>환영합니다!<br>이름을 입력하고 입장해주세요.</p>
        <input type="text" id="username" placeholder="이름 입력">
        <button onclick="enterMachine()">입장하기</button>
    </div>

    <div id="main-screen" class="container">
        <h2 id="welcome-msg" style="font-size: 1rem; color: var(--color-primary-blue);"></h2>
        
        <div class="gacha-machine">
            <div class="machine-dome" id="machine-dome">
                <div class="capsule c1"></div> <div class="capsule c2"></div>
                <div class="capsule c3"></div> <div class="capsule c4"></div>
                <div class="capsule c5"></div> <div class="capsule c6"></div>
            </div>
            <div class="machine-body">
                <div class="lever-btn" onclick="startDraw()">레버 돌리기</div>
            </div>
        </div>

        <div id="result-bar">?</div>

        <div id="action-area">
            <button id="select-btn" class="btn-select" onclick="selectWord()" style="display: none;">이 단어로 결정!</button>
        </div>
        <p class="info-txt">남은 단어: <span id="count">0</span> / 20</p>
    </div>

    <div id="success-screen" class="container">
        <h1 style="font-size: 3rem;">🎉</h1>
        <h2 id="final-username"></h2>
        <p>선택하신 단어는 <strong><span id="chosen-word" style="font-size: 1.5rem; color: var(--color-primary-blue);"></span></strong> 입니다!</p>
        <p>랜덤뽑기 단어가 확정되었습니다.</p>
    </div>

    <script>
        // Firebase 설정 (기존 정보 유지)
        const firebaseConfig = {
            apiKey: "AIzaSyB0fYqqVIcSnZI34Qk5AldPAKCiwK7fb60",
            authDomain: "hangeul-love-club.firebaseapp.com",
            projectId: "hangeul-love-club",
            storageBucket: "hangeul-love-club.firebasestorage.app",
            messagingSenderId: "983798363707",
            appId: "1:983798363707:web:0c9710c2ac5f4b82ec0e1e",
            measurementId: "G-RCPVETCQB0",
            databaseURL: "https://hangeul-love-club-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let adjectives = [];
        let currentWord = "";
        let username = "";
        let isRolling = false;

        db.ref('words').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                const initialWords = ['어여쁜', '사랑스러운', '찬란한', '소란스러운', '영롱한', '신비로운', '평온한', '강렬한', '포근한', '싱그러운', '눈부신', '우아한', '몽환적인', '당당한', '따사로운', '명랑한', '담백한', '숭고한', '순수한', '고귀한'];
                db.ref('words').set(initialWords);
                return;
            }
            adjectives = data;
            document.getElementById('count').innerText = adjectives.length;
        });

        function enterMachine() {
            username = document.getElementById('username').value.trim();
            if (!username) return alert("이름을 입력하세요!");
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('welcome-msg').innerText = `${username}님 반가워요!`;
        }

        function startDraw() {
            if (isRolling || adjectives.length === 0) return;
            isRolling = true;
            document.getElementById('machine-dome').classList.add('spin');
            document.getElementById('select-btn').style.display = 'none';
            
            let counter = 0;
            let shuffle = setInterval(() => {
                document.getElementById('result-bar').innerText = adjectives[Math.floor(Math.random() * adjectives.length)];
                counter++;
                if (counter > 10) {
                    clearInterval(shuffle);
                    stopDraw();
                }
            }, 100);
        }

        function stopDraw() {
            document.getElementById('machine-dome').classList.remove('spin');
            currentWord = adjectives[Math.floor(Math.random() * adjectives.length)];
            document.getElementById('result-bar').innerText = currentWord;
            document.getElementById('select-btn').style.display = 'block';
            isRolling = false;
        }

        function selectWord() {
            if (!confirm(`'${currentWord}'를 선택하시겠습니까?`)) return;
            const updated = adjectives.filter(w => w !== currentWord);
            
            const selectionRef = db.ref('selections').push();
            Promise.all([
                db.ref('words').set(updated),
                selectionRef.set({ username, selectedWord: currentWord, timestamp: firebase.database.ServerValue.TIMESTAMP })
            ]).then(() => {
                document.getElementById('main-screen').style.display = 'none';
                document.getElementById('success-screen').style.display = 'block';
                document.getElementById('final-username').innerText = `${username}님!`;
                document.getElementById('chosen-word').innerText = currentWord;
            });
        }
    </script>
</body>
</html>
