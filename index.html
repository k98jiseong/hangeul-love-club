<section id="step3" class="step">
    <div id="roulette-box">?</div>
    <p id="loading-text">팀을 배정하고 있습니다...</p>
    
    <button id="stop-btn" onclick="manualStop()" style="background: var(--accent); margin-bottom: 20px;">결과 바로 확인하기</button>

    <div id="result-content" style="display:none;">
        <h2 id="display-team"></h2>
        <p id="display-loc" style="color:#666; margin-bottom:20px;"></p>
        <button id="kakao-btn" onclick="sendKakao()">카카오톡으로 공유하기</button>
        <button onclick="location.reload()" style="background:#eee; color:#333; margin-top:10px;">처음으로</button>
    </div>
</section>

<script>
    // ... (상단 설정 및 변수들은 그대로 유지) ...

    let isFinished = false; // 중복 멈춤 방지

    async function assignTeam() {
        state.name = document.getElementById('userName').value.trim();
        if(!state.name) return alert("이름을 입력해 주세요!");

        goNext(3);
        isFinished = false;

        try {
            // 1. DB에서 현재 인원 확인 (최대 3초 대기)
            const timeoutPromise = new Promise(resolve => setTimeout(() => resolve(null), 3000));
            const snapshot = await Promise.race([db.ref('users').once('value'), timeoutPromise]);
            
            const users = snapshot && snapshot.val() ? Object.values(snapshot.val()) : [];
            const counts = { 'A조': 0, 'B조': 0, 'C조': 0 };
            users.forEach(u => { if(counts[u.team] !== undefined) counts[u.team]++; });

            const limits = { 'A조': 3, 'B조': 3, 'C조': 2 };
            const available = Object.keys(limits).filter(t => counts[t] < limits[t]);

            // 조 배정 (데이터가 없으면 랜덤으로 선택)
            const finalPool = available.length > 0 ? available : ['A조', 'B조', 'C조'];
            state.team = finalPool[Math.floor(Math.random() * finalPool.length)];

            // 2. 파이어베이스에 데이터 전송 (성공 여부와 상관없이 진행)
            db.ref('users').push({
                name: state.name,
                location: state.location,
                team: state.team,
                date: new Date().toISOString()
            }).catch(e => console.error("DB 저장 실패:", e));

            // 3. 2.5초 후 자동으로 멈춤 연출
            setTimeout(() => {
                if(!isFinished) showFinalResult();
            }, 2500);

        } catch(e) {
            console.error("오류 발생:", e);
            state.team = "A조"; // 오류 시 기본값
            setTimeout(() => { if(!isFinished) showFinalResult(); }, 2500);
        }
    }

    // 수동으로 멈추는 함수
    function manualStop() {
        if(!state.team) state.team = ['A조', 'B조', 'C조'][Math.floor(Math.random() * 3)];
        showFinalResult();
    }

    function showFinalResult() {
        isFinished = true;
        const box = document.getElementById('roulette-box');
        box.classList.add('stop');
        box.innerText = state.team;
        
        document.getElementById('loading-text').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'none'; // 멈춤 버튼 숨기기
        document.getElementById('result-content').style.display = 'block';
        document.getElementById('display-team').innerText = `${state.name}님은 [${state.team}] 입니다!`;
        document.getElementById('display-loc').innerText = `장소: ${state.location}`;
    }

    // ... (카카오 공유 함수 그대로 유지) ...
</script>
