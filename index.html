<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한글사랑클럽 월별 단어 뽑기</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --color-dark-blue: #010D26;
            --color-primary-blue: #0455BF;
            --color-bg-light: #CEE8F2;
            --color-white: #FFFFFF;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--color-bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--color-white);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* 1. 로그인/입장 화면 */
        #username {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 12px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        /* 2. 메인 화면 - 3D 기계 배치 */
        #main-screen { display: none; }
        
        .machine-container {
            width: 260px;
            height: 320px;
            margin: 0 auto;
            position: relative;
            /* 생성된 이미지를 배경으로 설정 */
            background: url('gacha-machine.png') no-repeat center;
            background-size: contain;
        }

        /* 레버 영역 (이미지 위 투명 버튼 배치) */
        .lever-overlay {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: var(--color-lever-yellow);
            border-radius: 50%;
            border: 4px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.1s;
        }

        .lever-overlay:active {
            transform: translateX(-50%) scale(0.9);
        }

        /* 당첨 결과 바 (검은색 네온 스타일) */
        #result-bar {
            width: 220px;
            height: 50px;
            background: #111;
            border-radius: 15px;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00d2ff;
            font-weight: bold;
            font-size: 1.2rem;
            border: 2px solid #333;
        }

        /* 애니메이션: 기계가 흔들릴 때 */
        .shake-animation {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(1deg) translate(2px, -2px); }
            100% { transform: rotate(-1deg) translate(-2px, 2px); }
        }

        /* 버튼 스타일 복원 */
        button {
            background: var(--color-primary-blue);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .btn-select { background: #1dd1a1; margin-top: 10px; }
        
        #success-screen { display: none; }
    </style>
</head>
<body>

    <div id="intro-screen" class="container">
        <h1>한글사랑클럽<br>단어 뽑기</h1>
        <p>이름을 입력하고 시작하세요!</p>
        <input type="text" id="username" placeholder="이름 입력">
        <button onclick="enterMachine()">입장하기</button>
    </div>

    <div id="main-screen" class="container">
        <h3 id="welcome-msg" style="color: var(--color-primary-blue);"></h3>
        
        <div class="machine-container" id="gacha-machine">
            <div class="lever-overlay" onclick="startDraw()">PUSH</div>
        </div>

        <div id="result-bar">?</div>

        <div id="action-area">
            <button id="select-btn" class="btn-select" onclick="selectWord()" style="display: none;">이 단어로 결정!</button>
        </div>
        <p style="font-size: 0.9rem; color: #777; margin-top: 10px;">남은 단어: <span id="count">0</span> / 20</p>
    </div>

    <div id="success-screen" class="container">
        <h1 style="font-size: 3rem;">🎁</h1>
        <h2 id="final-username"></h2>
        <p>최종 선택 단어: <strong><span id="chosen-word" style="font-size: 1.5rem; color: var(--color-primary-blue);"></span></strong></p>
        <p>축하드립니다!</p>
    </div>

    <script>
        // Firebase 설정 유지
        const firebaseConfig = {
            apiKey: "AIzaSyB0fYqqVIcSnZI34Qk5AldPAKCiwK7fb60",
            authDomain: "hangeul-love-club.firebaseapp.com",
            projectId: "hangeul-love-club",
            storageBucket: "hangeul-love-club.firebasestorage.app",
            messagingSenderId: "983798363707",
            appId: "1:983798363707:web:0c9710c2ac5f4b82ec0e1e",
            measurementId: "G-RCPVETCQB0",
            databaseURL: "https://hangeul-love-club-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let adjectives = [];
        let currentWord = "";
        let username = "";
        let isRolling = false;

        db.ref('words').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                adjectives = data;
                document.getElementById('count').innerText = adjectives.length;
            }
        });

        function enterMachine() {
            username = document.getElementById('username').value.trim();
            if (!username) return alert("이름을 입력하세요!");
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('welcome-msg').innerText = `${username}님 반가워요!`;
        }

        function startDraw() {
            if (isRolling || adjectives.length === 0) return;
            isRolling = true;
            
            const machine = document.getElementById('gacha-machine');
            machine.classList.add('shake-animation'); // 기계 흔들림 효과
            
            let counter = 0;
            let shuffle = setInterval(() => {
                document.getElementById('result-bar').innerText = adjectives[Math.floor(Math.random() * adjectives.length)];
                counter++;
                if (counter > 15) {
                    clearInterval(shuffle);
                    machine.classList.remove('shake-animation');
                    stopDraw();
                }
            }, 100);
        }

        function stopDraw() {
            currentWord = adjectives[Math.floor(Math.random() * adjectives.length)];
            document.getElementById('result-bar').innerText = currentWord;
            document.getElementById('select-btn').style.display = 'block';
            isRolling = false;
        }

        function selectWord() {
            if (!confirm(`'${currentWord}'를 선택하시겠습니까?`)) return;
            const updated = adjectives.filter(w => w !== currentWord);
            
            const selectionRef = db.ref('selections').push();
            Promise.all([
                db.ref('words').set(updated),
                selectionRef.set({ username, selectedWord: currentWord, timestamp: firebase.database.ServerValue.TIMESTAMP })
            ]).then(() => {
                document.getElementById('main-screen').style.display = 'none';
                document.getElementById('success-screen').style.display = 'block';
                document.getElementById('final-username').innerText = `${username}님!`;
                document.getElementById('chosen-word').innerText = currentWord;
            });
        }
    </script>
</body>
</html>
