<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
  // 2. 파이어베이스 설정 (사용자님의 정보를 넣었습니다)
  const firebaseConfig = {
    apiKey: "AIzaSyB0fYqqVIcSnZI34Qk5AldPAKCiwK7fb60",
    authDomain: "hangeul-love-club.firebaseapp.com",
    projectId: "hangeul-love-club",
    storageBucket: "hangeul-love-club.firebasestorage.app",
    messagingSenderId: "983798363707",
    appId: "1:983798363707:web:0c9710c2ac5f4b82ec0e1e",
    measurementId: "G-RCPVETCQB0",
    // ★ 중요: DB 주소를 여기에 직접 추가했습니다.
    databaseURL: "https://hangeul-love-club-default-rtdb.firebaseio.com"
  };

  // Firebase 시작
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let adjectives = [];
  let currentWord = "";

  const resultDisplay = document.getElementById('result-display');
  const selectBtn = document.getElementById('select-btn');
  const countDisplay = document.getElementById('count');
  const machine = document.getElementById('machine');

  // [기능 1] DB에서 실시간으로 단어 목록 가져오기
  db.ref('words').on('value', (snapshot) => {
    const data = snapshot.val();
    
    // DB가 완전히 비어있을 때만 최초 1회 20개를 생성합니다.
    if (!data) {
      const initialWords = ['어여쁜', '사랑스러운', '찬란한', '소란스러운', '영롱한', '신비로운', '평온한', '강렬한', '포근한', '싱그러운', '눈부신', '우아한', '몽환적인', '당당한', '따사로운', '명랑한', '담백한', '숭고한', '순수한', '고귀한'];
      db.ref('words').set(initialWords);
      return;
    }
    
    adjectives = data;
    countDisplay.innerText = adjectives.length;
  });

  // [기능 2] 뽑기 시작
  function startDraw() {
    if (adjectives.length === 0) {
      alert("모든 형용사가 동이 났어요!");
      return;
    }
    machine.classList.add('shake');
    selectBtn.style.display = 'none';
    
    let counter = 0;
    let shuffleInterval = setInterval(() => {
      const tempIndex = Math.floor(Math.random() * adjectives.length);
      resultDisplay.innerText = adjectives[tempIndex];
      counter++;
      if (counter > 15) {
        clearInterval(shuffleInterval);
        stopDraw();
      }
    }, 100);
  }

  function stopDraw() {
    machine.classList.remove('shake');
    const finalIndex = Math.floor(Math.random() * adjectives.length);
    currentWord = adjectives[finalIndex];
    resultDisplay.innerText = currentWord;
    selectBtn.style.display = 'inline-block';
  }

  // [기능 3] 단어 선택하기 (핵심: DB에서 영구 삭제)
  function selectWord() {
    if (confirm(`'${currentWord}'를 선택하시겠습니까? 선택 후에는 다른 사람이 고를 수 없습니다.`)) {
      // 목록에서 현재 단어 제외
      const updatedList = adjectives.filter(word => word !== currentWord);
      
      // DB에 업데이트된 목록 저장 (이 코드가 실행되면 다른 사람 화면에서도 즉시 사라짐)
      db.ref('words').set(updatedList).then(() => {
        alert(`축하합니다! '${currentWord}'가 당신의 단어가 되었습니다.`);
        resultDisplay.innerText = "?";
        selectBtn.style.display = 'none';
      }).catch((error) => {
        alert("저장에 실패했습니다: " + error.message);
      });
    }
  }

  function enterMachine() {
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
  }
</script>
