<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출사 팀 빌딩</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <style>
        :root { --primary: #203864; --accent: #e67e22; }
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .step { display: none; }
        .step.active { display: block; }
        .card { display: block; padding: 15px; border: 2px solid #ddd; border-radius: 10px; margin: 10px 0; cursor: pointer; }
        .card:has(input:checked) { border-color: var(--primary); background: #f0f4f8; }
        input[type="radio"] { display: none; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #ccc; }
        #roulette { width: 100px; height: 100px; line-height: 100px; margin: 20px auto; border-radius: 50%; background: var(--accent); color: white; font-size: 1.5rem; animation: spin 0.2s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #roulette.stop { animation: none; background: #27ae60; }
    </style>
</head>
<body>
    <div class="container">
        <section id="step1" class="step active">
            <h2>장소 선택</h2>
            <label class="card"><input type="radio" name="loc" value="북촌한옥마을"><span>북촌한옥마을</span></label>
            <label class="card"><input type="radio" name="loc" value="남산서울타워"><span>남산서울타워</span></label>
            <label class="card"><input type="radio" name="loc" value="덕수궁"><span>덕수궁</span></label>
            <button onclick="next(2)" id="vBtn" disabled>투표 완료</button>
        </section>

        <section id="step2" class="step">
            <h2>이름 입력</h2>
            <input type="text" id="uName" placeholder="이름을 입력하세요">
            <button onclick="start()">팀 배정 시작</button>
        </section>

        <section id="step3" class="step">
            <div id="roulette">?</div>
            <button id="stopBtn" onclick="stop()">결과 확인하기 (멈춤)</button>
            <div id="res" style="display:none;">
                <h2 id="fTeam"></h2>
                <p id="fLoc"></p>
                <button onclick="share()" style="background:#FEE500; color:black;">카카오톡 공유</button>
            </div>
        </section>
    </div>

    <script>
        // 1. 설정 (본인 키 입력)
        const firebaseConfig = { apiKey: "YOUR_KEY", databaseURL: "YOUR_URL", projectId: "YOUR_ID", appId: "YOUR_APP_ID" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        Kakao.init('YOUR_KAKAO_KEY');

        let data = { name: "", loc: "", team: "" };

        document.querySelectorAll('input[name="loc"]').forEach(i => {
            i.onclick = () => { data.loc = i.value; document.getElementById('vBtn').disabled = false; };
        });

        function next(n) { 
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step'+n).classList.add('active');
        }

        function start() {
            data.name = document.getElementById('uName').value;
            if(!data.name) return alert("이름을 써주세요!");
            next(3);
            // 미리 팀 결정 (3:3:2 비율은 DB 상황에 따라 결정되지만 여기선 즉시 랜덤)
            const teams = ['A조', 'B조', 'C조'];
            data.team = teams[Math.floor(Math.random() * 3)];
        }

        function stop() {
            const r = document.getElementById('roulette');
            r.classList.add('stop');
            r.innerText = data.team;
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('res').style.display = 'block';
            document.getElementById('fTeam').innerText = data.name + "님은 " + data.team;
            document.getElementById('fLoc').innerText = "장소: " + data.loc;

            // 멈추는 순간 DB에 기록
            db.ref('users').push(data);
        }

        function share() {
            Kakao.Share.sendDefault({
                objectType: 'feed',
                content: {
                    title: '팀 배정 결과',
                    description: data.name + '님: ' + data.loc + ' (' + data.team + ')',
                    imageUrl: 'https://cdn-icons-png.flaticon.com/512/1042/1042339.png',
                    link: { mobileWebUrl: location.href, webUrl: location.href }
                }
            });
        }
    </script>
</body>
</html>
