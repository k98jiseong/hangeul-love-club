<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>출사 팀 빌딩</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        /* 모바일 최적화 스타일 변수 */
        :root {
            --primary: #203864;
            --accent: #e67e22;
            --bg: #f2f4f7;
            --white: #ffffff;
            --success: #27ae60;
            --text-main: #333;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            margin: 0; padding: 20px 15px; /* 모바일 좌우 여백 */
            background-color: var(--bg);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; box-sizing: border-box;
        }

        /* 메인 컨테이너 */
        .container {
            width: 100%; max-width: 400px; /* 모바일 한 손 너비 */
            background: var(--white);
            padding: 30px 24px;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(32, 56, 100, 0.08);
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        h2 { font-size: 1.35rem; color: var(--primary); margin-bottom: 1.8rem; letter-spacing: -0.5px; }

        /* 선택 카드 스타일링 */
        .options { display: flex; flex-direction: column; gap: 14px; margin-bottom: 1.8rem; }
        .card {
            padding: 18px; border: 2px solid #edf0f5; border-radius: 16px;
            cursor: pointer; font-weight: 600; font-size: 1rem;
            transition: all 0.25s ease; background: #fff;
            display: flex; align-items: center; justify-content: center;
        }
        .card:active { transform: scale(0.97); } /* 터치 피드백 */
        .card:has(input:checked) {
            border-color: var(--primary); background: #f0f4f8; color: var(--primary);
            box-shadow: 0 4px 12px rgba(32, 56, 100, 0.1);
        }
        input[type="radio"], input[type="text"] { display: none; }

        /* 입력창 디자인 */
        .input-field {
            width: 100%; padding: 16px; border: 2px solid #edf0f5;
            border-radius: 14px; margin-bottom: 1.2rem; font-size: 1rem;
            box-sizing: border-box; outline: none; transition: 0.2s;
            text-align: center; display: block;
        }
        .input-field:focus { border-color: var(--primary); background: #fff; }

        /* 버튼 공통 스타일 */
        button {
            width: 100%; padding: 18px; border: none; border-radius: 16px;
            background: var(--primary); color: white; font-weight: 700;
            font-size: 1.05rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 6px 15px rgba(32, 56, 100, 0.2);
        }
        button:disabled { background: #d1d8e0; box-shadow: none; cursor: not-allowed; }
        #stop-btn { background: var(--accent); margin-top: 10px; box-shadow: 0 6px 15px rgba(230, 126, 34, 0.3); }
        .retry-btn { background: #7f8c8d; margin-top: 25px; padding: 14px; font-size: 0.9rem; }

        /* 룰렛 애니메이션 */
        #roulette-box {
            width: 130px; height: 130px; line-height: 130px; margin: 30px auto;
            border-radius: 50%; background: var(--accent); color: white;
            font-size: 2.2rem; font-weight: 800;
            animation: spin 0.12s infinite linear;
            box-shadow: 0 0 25px rgba(230, 126, 34, 0.4);
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #roulette-box.stop { animation: none; background: var(--success); box-shadow: 0 0 25px rgba(39, 174, 96, 0.4); }

        /* 결과표 스타일 (모바일 가독성) */
        .ranking-container {
            display: none; width: 100%; max-width: 400px;
            background: var(--white); padding: 24px 18px; border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); box-sizing: border-box;
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 0.85rem; color: #888; padding-bottom: 12px; border-bottom: 2px solid #f8f9fa; }
        td { padding: 15px 5px; border-bottom: 1px solid #f8f9fa; font-size: 0.95rem; text-align: center; }
        .team-tag {
            padding: 5px 10px; border-radius: 8px; font-weight: 800; font-size: 0.75rem; color: #fff;
        }
        .A { background: #3498db; } .B { background: #9b59b6; } .C { background: #e74c3c; }

        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <section id="step1" class="step active">
        <h2>📷 어디로 갈까요?</h2>
        <div class="options">
            <label class="card"><input type="radio" name="location" value="북촌한옥마을"><span>북촌한옥마을</span></label>
            <label class="card"><input type="radio" name="location" value="남산서울타워"><span>남산서울타워</span></label>
            <label class="card"><input type="radio" name="location" value="덕수궁"><span>덕수궁</span></label>
        </div>
        <button onclick="goNext(2)" id="voteBtn" disabled>장소 선택 완료</button>
    </section>

    <section id="step2" class="step">
        <h2>👤 본인의 성함</h2>
        <input type="text" id="userName" class="input-field" placeholder="성함을 입력하세요" maxlength="10">
        <button onclick="assignTeam()">팀 배정 시작하기</button>
    </section>

    <section id="step3" class="step">
        <div id="roulette-box">?</div>
        <p id="loading-text" style="font-weight:600; color:#666;">운명의 팀을 고르는 중...</p>
        <button id="stop-btn" style="display:none;" onclick="handleStop()">지금 멈추기!</button>
        
        <div id="result-content" style="display:none;">
            <h2 id="display-team" style="margin-bottom: 10px;"></h2>
            <p style="color:#888; font-size:0.9rem; margin-bottom: 20px;">전체 명단이 아래에 생성되었습니다.</p>
            <button class="retry-btn" onclick="location.reload()">처음으로 가기</button>
        </div>
    </section>
</div>

<div id="ranking-section" class="ranking-container">
    <h3 style="margin-top:0; color:var(--primary); text-align:center; font-size:1.1rem;">📊 현재 팀 배정 현황</h3>
    <table>
        <thead>
            <tr><th width="30%">이름</th><th width="40%">장소</th><th width="30%">팀</th></tr>
        </thead>
        <tbody id="ranking-body"></tbody>
    </table>
</div>

<script>
    // 1. Firebase 설정 (본인 것으로 유지)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "hangeul-love-club.firebaseapp.com",
        databaseURL: "https://hangeul-love-club-default-rtdb.firebaseio.com",
        projectId: "hangeul-love-club",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = { name: "", location: "", team: "" };

    document.querySelectorAll('input[name="location"]').forEach(el => {
        el.addEventListener('change', (e) => {
            state.location = e.target.value;
            document.getElementById('voteBtn').disabled = false;
        });
    });

    function goNext(num) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(`step${num}`).classList.add('active');
    }

    async function assignTeam() {
        state.name = document.getElementById('userName').value.trim();
        if(!state.name) return alert("성함을 꼭 입력해주세요!");
        goNext(3);
        
        const snapshot = await db.ref('users').once('value');
        const users = snapshot.val() ? Object.values(snapshot.val()) : [];
        const counts = { 'A조': 0, 'B조': 0, 'C조': 0 };
        users.forEach(u => { if(counts[u.team] !== undefined) counts[u.team]++; });

        const limits = { 'A조': 3, 'B조': 3, 'C조': 2 };
        const available = Object.keys(limits).filter(t => counts[t] < limits[t]);

        if(available.length === 0) {
            alert("정원이 모두 찼습니다!");
            location.reload();
            return;
        }
        state.team = available[Math.floor(Math.random() * available.length)];
        document.getElementById('stop-btn').style.display = 'block';
    }

    async function handleStop() {
        document.getElementById('stop-btn').style.display = 'none';
        await db.ref('users').push({
            name: state.name, location: state.location, team: state.team, date: new Date().toISOString()
        });
        
        document.getElementById('roulette-box').classList.add('stop'); 
        document.getElementById('roulette-box').innerText = state.team;
        document.getElementById('loading-text').style.display = 'none';
        document.getElementById('result-content').style.display = 'block';
        document.getElementById('display-team').innerText = `${state.name}님은 ${state.team}!`;
        document.getElementById('ranking-section').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    db.ref('users').on('value', (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('ranking-body');
        if(!data) return;
        const sorted = Object.values(data).sort((a, b) => new Date(b.date) - new Date(a.date));
        tbody.innerHTML = sorted.map(user => {
            const tc = user.team === 'A조' ? 'A' : (user.team === 'B조' ? 'B' : 'C');
            return `<tr><td>${user.name}</td><td>${user.location}</td><td><span class="team-tag ${tc}">${user.team}</span></td></tr>`;
        }).join('');
    });
</script>
</body>
</html>
